# =============================================================================
# BRP Project CI Workflow
# =============================================================================
#
# Add this badge to your README.md:
#
#   [![CI](https://github.com/<OWNER>/<REPO>/actions/workflows/ci.yml/badge.svg)](https://github.com/<OWNER>/<REPO>/actions/workflows/ci.yml)
#
# Replace <OWNER> and <REPO> with your GitHub username and repository name.
# =============================================================================

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Rust: Format, Lint, Test (ubuntu + macos + windows)
  # cargo-audit and cargo-deny run on ubuntu only (platform-specific advisory noise).
  # ---------------------------------------------------------------------------
  rust:
    name: Rust CI (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: bridge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "bridge -> target"

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy lints
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Verify no binding drift
        shell: bash
        run: |
          git diff --exit-code -- bindings/ || (
            echo "::error::Rust types changed but bindings/ not committed. Run: cargo test"
            exit 1
          )

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo-audit
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: cargo audit

      - name: Install cargo-deny
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        if: matrix.os == 'ubuntu-latest'
        run: cargo deny check

  # ---------------------------------------------------------------------------
  # Extension: Typecheck, Build, Test
  # ---------------------------------------------------------------------------
  extension:
    name: Extension CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Copy generated types
        run: npm run prebuild

      - name: Run typecheck
        run: npm run typecheck

      - name: Build extension
        run: npm run build

      - name: Run extension tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Integration: Smoke Tests (bridge startup + WS + JSON-RPC)
  # Only runs on PR triggers.
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "bridge -> target"

      - name: Build bridge
        working-directory: bridge
        run: cargo build --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install integration test deps
        working-directory: tests/integration
        run: npm ci

      - name: Run integration tests
        working-directory: tests/integration
        run: npm test
        env:
          BRP_BRIDGE_PATH: ${{ github.workspace }}/bridge/target/release/brp-bridge

  # ---------------------------------------------------------------------------
  # Integration E2E: Firefox + Extension end-to-end tests (xvfb, non-blocking)
  # ---------------------------------------------------------------------------
  integration-e2e:
    name: Integration E2E (disabled — run locally)
    runs-on: ubuntu-latest
    if: false  # v0.8.0: Firefox + extension in CI unreliable. Run: npx playwright test --config=playwright.e2e.config.ts
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "bridge -> target"

      - name: Build bridge
        working-directory: bridge
        run: cargo build --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install extension deps
        working-directory: extension
        run: npm ci

      - name: Build extension
        working-directory: extension
        run: npm run prebuild && npm run build

      - name: Install integration test deps
        working-directory: tests/integration
        run: npm ci

      - name: Install Firefox
        uses: browser-actions/setup-firefox@latest
        with:
          firefox-version: latest

      - name: Install xvfb
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb

      - name: Install Playwright browsers
        working-directory: tests/integration
        run: npx playwright install firefox

      - name: Run E2E tests (xvfb)
        working-directory: tests/integration
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            npx playwright test --config=playwright.e2e.config.ts
        env:
          BRP_BRIDGE_PATH: ${{ github.workspace }}/bridge/target/release/brp-bridge
          DISPLAY: ":99"

  # ---------------------------------------------------------------------------
  # Summary: Required checks pass if all above succeed
  # ---------------------------------------------------------------------------
  ci-pass:
    name: CI Passed
    if: always()
    needs: [rust, extension, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          if [[ "${{ needs.rust.result }}" != "success" || "${{ needs.extension.result }}" != "success" ]]; then
            echo "One or more jobs failed."
            exit 1
          fi
          if [[ "${{ needs.integration.result }}" != "success" && "${{ needs.integration.result }}" != "skipped" ]]; then
            echo "Integration job failed."
            exit 1
          fi
          echo "All CI jobs passed."

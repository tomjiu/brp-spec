name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-bridge:
    name: Build Bridge (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: brp-bridge-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: brp-bridge-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: brp-bridge-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: brp-bridge-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "bridge -> target"

      - name: Build bridge
        working-directory: bridge
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cd bridge/target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp brp-bridge.exe ${{ matrix.artifact }}
          else
            cp brp-bridge ${{ matrix.artifact }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bridge/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  build-extension:
    name: Build Extension (.xpi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install + build extension
        working-directory: extension
        run: |
          npm ci
          npm run prebuild
          npm run build

      - name: Package .xpi
        run: |
          cd extension
          TAG=${GITHUB_REF_NAME#v}
          zip -r ../brp-extension-v${TAG}.xpi \
            manifest.json dist/ icons/ options/ popup/

      - uses: actions/upload-artifact@v4
        with:
          name: brp-extension-xpi
          path: brp-extension-v*.xpi

  release:
    name: Create Release
    needs: [build-bridge, build-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/brp-bridge-linux-x64/brp-bridge-linux-x64
            artifacts/brp-bridge-macos-x64/brp-bridge-macos-x64
            artifacts/brp-bridge-macos-arm64/brp-bridge-macos-arm64
            artifacts/brp-bridge-windows-x64.exe/brp-bridge-windows-x64.exe
            artifacts/brp-extension-xpi/brp-extension-v*.xpi
            adapter/brp_mcp_adapter.py
            install.sh
            install.ps1

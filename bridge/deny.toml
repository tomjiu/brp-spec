# =============================================================================
# cargo-deny configuration for BRP Bridge
# =============================================================================
# Docs: https://embarkstudios.github.io/cargo-deny/
# =============================================================================

# ---------------------------------------------------------------------------
# Advisory database — fail on known security vulnerabilities
# ---------------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# ---------------------------------------------------------------------------
# Licenses — allow permissive licenses only
# ---------------------------------------------------------------------------
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
# Confidence threshold for license detection (0.0 - 1.0)
confidence-threshold = 0.8

# ---------------------------------------------------------------------------
# Bans — block problematic crates
# ---------------------------------------------------------------------------
[bans]
# Warn on duplicate dependencies with different versions
multiple-versions = "warn"
# Allow all crates by default; add specific bans below as needed
# deny = [{ crate = "example-crate", reason = "deprecated and unmaintained" }]

# ---------------------------------------------------------------------------
# Sources — control which registries and git repos are allowed
# ---------------------------------------------------------------------------
[sources]
# Allow crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Disallow arbitrary git dependencies (uncomment to enforce)
# allow-git = []

# ---------------------------------------------------------------------------
# Dependency count — warn if tree grows too large
# ---------------------------------------------------------------------------
# cargo-deny does not enforce a max dependency count natively.
# Use this command in CI or locally to check:
#   cargo tree --prefix depth -e normal | wc -l
# Target: keep total unique crates under 500.
[graph]
targets = []

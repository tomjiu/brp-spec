<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; width: 320px; max-height: 420px; overflow-y: auto; padding: 10px; background: #fff; color: #1a1a1a; }
    h2 { font-size: 14px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #e5e7eb; }
    .tab-item { display: flex; align-items: center; gap: 8px; padding: 6px 2px; border-bottom: 1px solid #f3f4f6; }
    .tab-item img { width: 16px; height: 16px; flex-shrink: 0; }
    .tab-item .title { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-item .toggle { flex-shrink: 0; cursor: pointer; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; border: none; }
    .tab-item .toggle.on { background: #22c55e; color: #fff; }
    .tab-item .toggle.off { background: #e5e7eb; color: #6b7280; }
    .empty { font-size: 12px; color: #9ca3af; padding: 12px 0; text-align: center; }
    .loading { text-align: center; padding: 20px; font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <h2>BRP Tab Control</h2>
  <div id="tab-list">
    <div class="loading">Loading...</div>
  </div>
  <script src="../dist/popup.js"></script>
</body>
</html>
